# SPDX-License-Identifier: GPL-2.0
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Gating checks: coding style, static analysis, and a clean build of the
  # module + user-space programs against the runner's kernel headers.
  static:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The runner can reliably install only its own kernel's headers. On a
        # self-hosted runner with several header sets installed, add them here
        # to get the multi-version build matrix the project targets.
        kheaders:
          - "linux-headers-$(uname -r)"
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential sparse \
            $(eval echo ${{ matrix.kheaders }})

      - name: checkpatch --strict
        run: make checkpatch KDIR=/lib/modules/$(uname -r)/build

      - name: Build module
        run: make modules KDIR=/lib/modules/$(uname -r)/build

      - name: Build tests and benchmark
        run: make tests bench

      - name: sparse (make C=2)
        run: make sparse KDIR=/lib/modules/$(uname -r)/build

  # Boot throwaway VMs and run the pytest verification suite (one boot per
  # test, JUnit + per-test console/dmesg artifacts). Standard GitHub Linux
  # runners expose /dev/kvm; still best-effort because boot speed and kernel
  # availability vary — treat the static job as the hard gate.
  verif:
    runs-on: ubuntu-latest
    needs: static
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential busybox-static \
            qemu-system-x86 linux-headers-$(uname -r) python3-pytest

      - name: Enable KVM for the runner user
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true

      - name: Provision a readable kernel image
        run: |
          mkdir -p .qemu
          sudo install -m644 /boot/vmlinuz-$(uname -r) .qemu/bzImage

      - name: Run the verification suite
        run: make verif

      - name: Upload verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verif-results
          path: |
            .qemu/verif.xml
            verif/_artifacts/
          if-no-files-found: ignore
