# SPDX-License-Identifier: GPL-2.0
name: ci

on:
  push:
    branches: [main]
  pull_request:
  # The verification gates build an instrumented kernel from source (tens of
  # minutes), so they are not run per-commit: trigger them by hand or weekly.
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  # Gating checks: coding style, static analysis, and a clean build of the
  # module + user-space programs against the runner's kernel headers.
  static:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The runner can reliably install only its own kernel's headers. On a
        # self-hosted runner with several header sets installed, add them here
        # to get the multi-version build matrix the project targets.
        kheaders:
          - "linux-headers-$(uname -r)"
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential sparse \
            $(eval echo ${{ matrix.kheaders }})

      - name: checkpatch --strict
        run: make checkpatch KDIR=/lib/modules/$(uname -r)/build

      - name: Build module
        run: make modules KDIR=/lib/modules/$(uname -r)/build

      - name: Build tests and benchmark
        run: make tests bench

      - name: Build the kbuf++ GoogleTest suite
        run: make gtest cpp

      - name: sparse (make C=2)
        run: make sparse KDIR=/lib/modules/$(uname -r)/build

  # Boot throwaway VMs and run the pytest verification suite (one boot per
  # test, JUnit + per-test console/dmesg artifacts). Standard GitHub Linux
  # runners expose /dev/kvm; still best-effort because boot speed and kernel
  # availability vary — treat the static job as the hard gate.
  verif:
    runs-on: ubuntu-latest
    needs: static
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential busybox-static \
            qemu-system-x86 linux-headers-$(uname -r) python3-pytest

      - name: Enable KVM for the runner user
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true

      - name: Provision a readable kernel image
        run: |
          mkdir -p .qemu
          sudo install -m644 /boot/vmlinuz-$(uname -r) .qemu/bzImage

      - name: Build GoogleTest (for the kbuf++ suite)
        run: make gtest

      - name: Run the verification suite
        run: make verif

      - name: Upload verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verif-results
          path: |
            .qemu/verif.xml
            verif/_artifacts/
          if-no-files-found: ignore

  # Memory/race verification gates: build an instrumented kernel from source
  # (KASAN+kmemleak+lockdep+failslab, then KCSAN) and re-run the driver's
  # workloads under it. Heavy (kernel build) and only on manual/scheduled
  # runs. The module is rebuilt against the debug kernel by the framework.
  gates:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    needs: static
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        variant: [kasan, kcsan]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential busybox-static \
            qemu-system-x86 python3-pytest \
            flex bison libelf-dev libssl-dev bc wget cpio

      - name: Enable KVM for the runner user
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true

      - name: Build GoogleTest (for the kbuf++ suite)
        run: make gtest

      - name: Build the ${{ matrix.variant }} debug kernel
        run: ./scripts/build-debug-kernel.sh ${{ matrix.variant }}

      - name: Run the gates under the ${{ matrix.variant }} kernel
        run: |
          python3 -m pytest verif --kbuf-variant=${{ matrix.variant }} \
            --junitxml=.qemu/gates-${{ matrix.variant }}.xml

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-results-${{ matrix.variant }}
          path: |
            .qemu/gates-${{ matrix.variant }}.xml
            verif/_artifacts/
          if-no-files-found: ignore
